services:
    laravel.test:
        build:
            context: .
            dockerfile: Dockerfile
        image: alucom-app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '8000:10000'
            - '5173:5173'
        environment:
            LARAVEL_SAIL: 1
            DB_CONNECTION: pgsql
            DB_HOST: pgsql
            DB_PORT: 5432
            DB_DATABASE: '${DB_DATABASE}'
            DB_USERNAME: '${DB_USERNAME}'
            DB_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - '.:/app'
        networks:
            - sail
        depends_on:
            - pgsql

    pgsql:
        image: 'postgres:15-alpine'
        ports:
            - '5432:5432'
        environment:
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE}", "-U", "${DB_USERNAME}"]
            retries: 3
            timeout: 5s

networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local